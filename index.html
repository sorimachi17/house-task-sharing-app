<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家事ログ">
<meta name="theme-color" content="#2A9D8F">
<title>KAJI LOG | 家事ログ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23fff'/%3E%3Cpath d='M32 2a30 30 0 0 0 0 60z' fill='%232A9D8F'/%3E%3Cpath d='M32 2a30 30 0 0 1 0 60z' fill='%23E9A03B'/%3E%3C/svg%3E" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <h1 class="app-title">KAJI LOG<span id="demoBadge" class="demo-badge hidden">DEMO</span></h1>
  <div class="header-actions">
    <button type="button" id="settingsBtn" class="icon-btn-header" aria-label="設定">⚙️</button>
    <div class="user-toggle" id="userToggle">
      <button type="button" class="user-toggle-btn" data-user="a">A</button>
      <button type="button" class="user-toggle-btn" data-user="b">B</button>
    </div>
  </div>
</header>

<main id="main">

  <!-- 記録タブ -->
  <section id="view-record" class="view">
    <div class="score-card" id="scoreCard">
      <div class="score-card-title">今週の対決(月〜日)</div>
      <div id="weekBattleBars"></div>
      <div class="score-leader" id="scoreLeaderText"></div>
      <div class="score-today-row">
        <span>今日のポイント</span>
        <div class="score-today-values" id="todayPointsText"></div>
      </div>
    </div>
    <div class="chore-list" id="choreList"></div>
  </section>

  <!-- カレンダータブ -->
  <section id="view-grass" class="view hidden">
    <div class="period-nav">
      <button type="button" class="nav-btn" id="grassPrevBtn" aria-label="前月">‹</button>
      <div class="period-label" id="grassMonthLabel"></div>
      <button type="button" class="nav-btn" id="grassNextBtn" aria-label="翌月">›</button>
    </div>
    <div class="grass-weekday-row">
      <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span>
    </div>
    <div class="grass-grid" id="grassGrid"></div>
    <div class="grass-legend">
      <span class="legend-swatch" style="background:var(--color-a)"></span>A=上半分
      <span class="legend-swatch" style="background:var(--color-b)"></span>B=下半分
    </div>
    <div class="month-summary" id="grassSummary"></div>
  </section>

  <!-- 週タブ -->
  <section id="view-week" class="view hidden">
    <div class="period-nav">
      <button type="button" class="nav-btn" id="weekPrevBtn" aria-label="前週">‹</button>
      <div class="period-label" id="weekLabel"></div>
      <button type="button" class="nav-btn" id="weekNextBtn" aria-label="翌週">›</button>
    </div>
    <button type="button" class="btn-ghost btn-small" id="weekTodayBtn">今週</button>
    <div class="week-timetable" id="weekTimetable"></div>
  </section>

  <!-- 集計タブ -->
  <section id="view-summary" class="view hidden">
    <div class="summary-period-toggle" id="summaryPeriodToggle">
      <button type="button" class="segment-btn active" data-period="week">今週</button>
      <button type="button" class="segment-btn" data-period="month">今月</button>
    </div>
    <div class="period-nav">
      <button type="button" class="nav-btn" id="summaryPrevBtn" aria-label="前の期間">‹</button>
      <div class="period-label" id="summaryLabel"></div>
      <button type="button" class="nav-btn" id="summaryNextBtn" aria-label="次の期間">›</button>
    </div>
    <div class="summary-bars" id="summaryBars"></div>
    <table class="summary-table" id="summaryTable">
      <thead>
        <tr><th>家事</th><th>A</th><th>B</th><th>二人で</th><th>計</th></tr>
      </thead>
      <tbody id="summaryTableBody"></tbody>
    </table>
  </section>

</main>

<div class="fab-wrap"><button type="button" class="fab-button" id="fabButton" aria-label="記録する">＋ 記録</button></div>

<nav class="tab-bar">
  <button type="button" class="tab-btn active" data-view="record">
    <span class="tab-icon">📝</span><span>記録</span>
  </button>
  <button type="button" class="tab-btn" data-view="grass">
    <span class="tab-icon">📅</span><span>カレンダー</span>
  </button>
  <button type="button" class="tab-btn" data-view="week">
    <span class="tab-icon">🗓️</span><span>週</span>
  </button>
  <button type="button" class="tab-btn" data-view="summary">
    <span class="tab-icon">📊</span><span>集計</span>
  </button>
</nav>

<!-- 記録モーダル -->
<div id="recordModal" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <h2 id="recordModalTitle" class="modal-title"></h2>
    <div id="recordModalDuration" class="modal-subtext hidden"></div>
    <div class="field-label">実施者</div>
    <div class="segmented" id="doneBySegment">
      <button type="button" class="segment-btn" data-value="a">A</button>
      <button type="button" class="segment-btn" data-value="b">B</button>
      <button type="button" class="segment-btn" data-value="both">二人で</button>
    </div>
    <div class="field-label">日時</div>
    <input type="datetime-local" id="doneAtInput" class="datetime-input">
    <div class="modal-actions">
      <button type="button" id="deleteLogBtn" class="btn-danger hidden">削除</button>
      <button type="button" id="cancelRecordBtn" class="btn-ghost">キャンセル</button>
      <button type="button" id="saveRecordBtn" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- どこからでも記録できる家事選択シート -->
<div id="fabSheet" class="sheet-overlay hidden">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">記録する家事を選ぶ</h2>
    <div id="fabChoreList" class="sheet-body"></div>
    <button type="button" id="closeFabSheetBtn" class="btn-ghost">閉じる</button>
  </div>
</div>

<!-- 一覧ボトムシート(日/時間帯詳細) -->
<div id="listSheet" class="sheet-overlay hidden">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle"></div>
    <h2 id="listSheetTitle" class="sheet-title"></h2>
    <div id="listSheetBody" class="sheet-body"></div>
    <button type="button" id="closeListSheetBtn" class="btn-ghost">閉じる</button>
  </div>
</div>

<!-- 設定シート(表示名・家事マスタ管理) -->
<div id="settingsSheet" class="sheet-overlay hidden">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">設定</h2>
    <div class="sheet-body">
      <div class="settings-section">
        <div class="settings-section-title">表示名</div>
        <div class="settings-name-row">
          <span class="settings-name-dot" style="background:var(--color-a)"></span>
          <input type="text" id="userNameAInput" class="text-input" maxlength="10">
        </div>
        <div class="settings-name-row">
          <span class="settings-name-dot" style="background:var(--color-b)"></span>
          <input type="text" id="userNameBInput" class="text-input" maxlength="10">
        </div>
        <button type="button" id="saveNamesBtn" class="btn-primary btn-full">名前を保存</button>
      </div>
      <div class="settings-section">
        <div class="settings-section-title-row">
          <div class="settings-section-title">家事一覧</div>
          <button type="button" id="addChoreBtn" class="btn-ghost btn-small">＋ 追加</button>
        </div>
        <div id="choreManageList" class="chore-manage-list"></div>
      </div>
    </div>
    <button type="button" id="closeSettingsBtn" class="btn-ghost">閉じる</button>
  </div>
</div>

<!-- 家事の追加・編集モーダル -->
<div id="choreModal" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <h2 id="choreModalTitle" class="modal-title">家事を追加</h2>
    <div class="field-label">家事名</div>
    <input type="text" id="choreNameInput" class="text-input" maxlength="40">
    <div class="field-label">カテゴリ</div>
    <input type="text" id="choreCategoryInput" class="text-input" list="categoryOptions" maxlength="20">
    <datalist id="categoryOptions"></datalist>
    <div class="field-label">目安時間</div>
    <div class="segmented segmented-wrap" id="choreDurationSegment">
      <button type="button" class="segment-btn" data-value="under5">〜5分</button>
      <button type="button" class="segment-btn" data-value="5to10">5〜10分</button>
      <button type="button" class="segment-btn" data-value="10to15">10〜15分</button>
      <button type="button" class="segment-btn" data-value="15to20">15〜20分</button>
    </div>
    <div class="field-label">ポイント(手間の目安)</div>
    <input type="number" id="chorePointsInput" class="text-input" min="1" max="20" step="1">
    <div class="modal-actions">
      <button type="button" id="cancelChoreBtn" class="btn-ghost">キャンセル</button>
      <button type="button" id="saveChoreBtn" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
